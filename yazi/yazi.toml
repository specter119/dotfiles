[mgr]
ratio = [1, 2, 5]

[preview]
max_width = 2560
max_height = 1440
image_filter = "triangle"
image_quality = 80
image_delay = 50

[plugin]
prepend_previewers = [
  {mime = "image/svg+xml", run = "image"},
  {mime = "text/csv", run = "duckdb"},
  {mime = "text/tab-separated-values", run = "duckdb"},
  {mime = "application/json", run = "duckdb"},
  {mime = "application/x-ndjson", run = "duckdb"},
  {mime = "application/vnd.apache.parquet", run = "duckdb"},
  {url = "*.parquet", run = "duckdb"},
  {mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", run = "duckdb"},
  {mime = "application/x-sqlite3", run = "duckdb"},
  {mime = "application/x-duckdb", run = "duckdb"},
  {url = "*.db", run = "duckdb"},
  {url = "*.duckdb", run = "duckdb"}
]
prepend_preloaders = [
  {mime = "text/csv", run = "duckdb", multi = false},
  {mime = "text/tab-separated-values", run = "duckdb", multi = false},
  {mime = "application/json", run = "duckdb", multi = false},
  {mime = "application/x-ndjson", run = "duckdb", multi = false},
  {mime = "application/vnd.apache.parquet", run = "duckdb", multi = false},
  {url = "*.parquet", run = "duckdb", multi = false},
  {mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", run = "duckdb", multi = false}
]

[opener]
# {{#if (command_success "uname -r | grep -qi wsl")}}
edit = [
  {run = '$EDITOR %s', block = true, for = "unix"}
]
open = [
  # orphan = true detaches the process so yazi ignores exit codes
  # (fixes WSL explorer.exe returning non-zero)
  {run = 'xdg-open %s1', orphan = true, desc = "Open", for = "unix"}
]
# {{/if}}
extract = [
  {run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix"}
]
