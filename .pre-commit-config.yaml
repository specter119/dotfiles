repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-toml
        exclude: ^(alacritty/alacritty\.toml|codex/config\.toml|codex/codex/config\.toml)$
      - id: check-yaml
      - id: check-json
        exclude: ^(pi/(models|settings)\.json|droid/config/settings\.json|opencode/config/tui\.json|antigravity/antigravity/settings\.json)$
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
      - id: double-quote-string-fixer
      - id: end-of-file-fixer
        exclude: ^fcitx5/fcitx5
      - id: forbid-new-submodules
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: pretty-format-json
        args: [--autofix]
        exclude: ^(pi/(models|settings)\.json|droid/config/settings\.json|opencode/config/tui\.json|antigravity/antigravity/settings\.json)$
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/pappasam/toml-sort
    rev: v0.24.4
    hooks:
      - id: toml-sort-fix
        args: [--in-place, --no-sort-tables]
        exclude: ^(alacritty/alacritty\.toml|codex/config\.toml|codex/codex/config\.toml|jj/config\.toml|yazi/yazi\.toml)$
