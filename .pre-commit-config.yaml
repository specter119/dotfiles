repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-toml
        exclude: ^(alacritty/alacritty\.toml|codex/codex/config\.toml|jj/config\.toml|yazi/yazi\.toml)$
      - id: check-yaml
        exclude: ^(glab/config\.yml|mihomo/config\.yaml|skm/skills\.yaml)$
      - id: check-json
        exclude: ^(amp/settings\.json|antigravity/antigravity/(mcp_config|settings)\.json|copilot/mcp-config\.json|docker/config\.json|droid/config/(mcp|settings)\.json|opencode/(config/tui|share/auth)\.json|pi/(auth|models|settings)\.json)$
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
      - id: double-quote-string-fixer
      - id: end-of-file-fixer
        exclude: ^fcitx5/fcitx5
      - id: forbid-new-submodules
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: pretty-format-json
        args: [--autofix]
        exclude: ^(docker/config\.json|amp/settings\.json|antigravity/antigravity/(mcp_config|settings)\.json|copilot/mcp-config\.json|droid/config/(mcp|settings)\.json|opencode/(config/tui|share/auth)\.json|pi/(auth|models|settings)\.json)$
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        exclude: ^(glab/config\.yml|mihomo/config\.yaml|skm/skills\.yaml)$
  - repo: https://github.com/pappasam/toml-sort
    rev: v0.24.4
    hooks:
      - id: toml-sort-fix
        args: [--in-place, --no-sort-tables]
        exclude: ^(alacritty/alacritty\.toml|codex/codex/config\.toml|jj/config\.toml|yazi/yazi\.toml)$
