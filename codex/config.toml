model = "gpt-5.5"
{{#if codex.model_provider}}model_provider = "{{codex.model_provider}}"{{/if}}
personality = "pragmatic"
disable_response_storage = true
web_search = "live"
notify = ["~/.local/share/cli-hooks/notify.sh"]
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
suppress_unstable_features_warning = true
default_permissions = "workspace-plus-cache"

[model_providers]

[model_providers.packycode]
name = "packycode"
base_url = "https://www.packyapi.com/v1"
wire_api = "responses"
requires_openai_auth = true

[features]
collaboration_modes = true
multi_agent = true
shell_snapshot = true
hooks = true
prevent_idle_sleep = true
memories = true
terminal_resize_reflow = true
mentions_v2 = true
goals = true
browser_use = true

[permissions]

[permissions.workspace-plus-cache]

[permissions.workspace-plus-cache.filesystem]
":root" = "read"
":workspace_roots" = "write"
"~/.cache" = "write"
"/tmp" = "write"
"/run/user/1000" = "write"

[permissions.workspace-plus-cache.network]
enabled = true

[tui]
notifications = ["approval-requested"]
status_line = ["model-with-reasoning", "context-remaining", "current-dir"]

[tui.model_availability_nux]
"gpt-5.5" = 4

[plugins]

[plugins."github@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."openai-developers@openai-curated"]
enabled = true

[projects]
# {{#if codex.trusted_projects}}
# {{#each codex.trusted_projects}}

[projects."{{this}}"]
trust_level = "trusted"
# {{/each}}
# {{/if}}

[mcp_servers]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.context7]
command = "bunx"
args = ["@upstash/context7-mcp", "--api-key", "{{replace (command_output 'rbw get context7-api-key') '\n' ''}}"]

[mcp_servers.fast-context]
command = "bunx"
args = ["fast-context-mcp"]
enabled_tools = ["fast_context_search"]

[mcp_servers.fast-context.env]
WINDSURF_API_KEY = "{{replace (command_output 'rbw get windsurf-api-key') '\n' ''}}"

[mcp_servers.fast-context.tools]

[mcp_servers.fast-context.tools.fast_context_search]
approval_mode = "approve"

[marketplaces]

[marketplaces.openai-primary-runtime]
last_updated = "2026-05-22T15:27:11Z"
source_type = "local"
source = "~/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"

[hooks]

[hooks.state]
# {{#if codex.hook_states}}
# {{#each codex.hook_states}}

[hooks.state."{{key}}"]
trusted_hash = "{{trusted_hash}}"
# {{/each}}
# {{/if}}

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = true

[desktop]
ambient-suggestions-enabled = true
appearanceLightCodeThemeId = "catppuccin"
appearanceDarkCodeThemeId = "catppuccin"
reviewDelivery = "inline"
selected-avatar-id = "seedy"
conversationDetailMode = "STEPS_COMMANDS"

[desktop.appearanceLightChromeTheme]
accent = "#8839ef"
contrast = 45
ink = "#4c4f69"
opaqueWindows = false
surface = "#eff1f5"

[desktop.appearanceLightChromeTheme.fonts]

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#40a02b"
diffRemoved = "#d20f39"
skill = "#8839ef"

[desktop.appearanceDarkChromeTheme]
accent = "#cba6f7"
contrast = 60
ink = "#cdd6f4"
opaqueWindows = false
surface = "#1e1e2e"

[desktop.appearanceDarkChromeTheme.fonts]

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#a6e3a1"
diffRemoved = "#f38ba8"
skill = "#cba6f7"

[desktop.open-in-target-preferences]
global = "systemDefault"
